<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AudioNote | Precision Annotator</title>
    
    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- WaveSurfer.js -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --bg-app: #f1f5f9; --bg-side: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.85);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-app: #0f172a; --bg-side: #1e293b; --text-main: #f1f5f9;
                --text-muted: #94a3b8; --border: #334155; --glass: rgba(30, 41, 59, 0.85);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100vw; font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); overflow: hidden; }

        /* Desktop Layout */
        .app-container { display: grid; grid-template-columns: 300px 1fr 340px; height: 100vh; }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .app-container { display: block; height: calc(100vh - 70px); }
            .sidebar, .main-content, .notes-panel { display: none; width: 100% !important; height: 100% !important; border: none !important; padding: 20px !important; overflow-y: auto; }
            .sidebar.active, .main-content.active, .notes-panel.active { display: flex; flex-direction: column; }
            .mobile-nav { display: flex !important; }
        }

        /* UI Elements */
        .sidebar { background: var(--bg-side); border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; color: var(--text-main); }
        
        .upload-btn {
            background: var(--primary); color: white; padding: 16px; border-radius: 14px;
            font-weight: 700; cursor: pointer; text-align: center; border: none; display: block;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .file-list { flex-grow: 1; overflow-y: auto; }
        .file-item { padding: 14px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; background: var(--bg-app); display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 500; }
        .file-item.active { border: 2px solid var(--primary); background: rgba(79, 70, 229, 0.08); color: var(--primary); }

        .main-content { padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .player-card { width: 100%; max-width: 800px; background: var(--bg-side); padding: 30px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); backdrop-filter: blur(10px); background: var(--glass); }
        #waveform { margin: 25px 0; min-height: 120px; cursor: pointer; }
        
        .controls { display: flex; align-items: center; gap: 20px; }
        #btn-play { width: 60px; height: 60px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #timer { font-family: monospace; font-weight: 700; opacity: 0.8; font-size: 16px; }

        .input-group { margin-top: 30px; display: flex; gap: 10px; width: 100%; max-width: 800px; background: var(--bg-side); padding: 10px; border-radius: 18px; border: 1px solid var(--border); }
        input[type="text"] { flex-grow: 1; border: none; background: transparent; padding: 12px; font-size: 16px; outline: none; color: var(--text-main); }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: 600; cursor: pointer; }

        .notes-panel { background: var(--bg-side); border-left: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; }
        .note-card { padding: 16px; border-radius: 12px; background: var(--bg-app); margin-bottom: 12px; position: relative; border-left: 4px solid var(--primary); text-align: left; }
        .note-time { color: var(--primary); font-family: monospace; font-weight: 800; font-size: 14px; cursor: pointer; text-decoration: underline; }

        /* Mobile Navigation Bar */
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--bg-side); border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }

        /* Loading Screen */
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); color: white; z-index: 2000; align-items: center; justify-content: center; flex-direction: column; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">Processing Audio...</div>

    <div class="app-container">
        <!-- Sidebar (Library) -->
        <aside class="sidebar active" id="tab-library">
            <div class="logo">AudioNote</div>
            
            <label class="upload-btn">
                + Upload Audio
                <!-- Accepts various audio formats for mobile compatibility -->
                <input type="file" id="audio-upload" accept="audio/*, .mp3, .m4a, .wav, .aac" style="display: none;">
            </label>

            <div class="file-list" id="file-list"></div>
            
            <div style="font-size: 11px; color: var(--text-muted); text-align: center; margin-top: auto;">
                Files are stored locally on your device.
            </div>
        </aside>

        <!-- Main Content (Player) -->
        <main class="main-content" id="tab-player">
            <div id="empty-state">
                <div style="font-size:64px; margin-bottom: 20px;">🎵</div>
                <h2 style="margin:0">No Audio Selected</h2>
                <p style="color: var(--text-muted)">Upload a song from your phone to start.</p>
            </div>

            <div id="player-ui" style="display: none; width: 100%;">
                <h2 id="file-title" style="margin-top: 0; margin-bottom: 25px; font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Song Title</h2>
                
                <div class="player-card">
                    <div class="controls">
                        <button id="btn-play">▶</button>
                        <span id="timer">00:00 / 00:00</span>
                    </div>
                    <div id="waveform"></div>
                </div>

                <div class="input-group">
                    <input type="text" id="note-input" placeholder="Add a note at this time...">
                    <button id="btn-add" class="add-btn">Add</button>
                </div>
            </div>
        </main>

        <!-- Notes Panel -->
        <aside class="notes-panel" id="tab-notes">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0">Notes</h3>
                <button onclick="exportNotes()" style="background:none; border:1px solid var(--border); padding:5px 10px; border-radius:8px; font-size:12px; cursor:pointer; color:var(--text-muted);">Export .TXT</button>
            </div>
            <div id="notes-display" style="overflow-y: auto; flex-grow: 1;"></div>
        </aside>
    </div>

    <!-- Mobile Nav -->
    <nav class="mobile-nav">
        <div class="nav-item active" onclick="switchTab('library')">
            <span class="nav-icon">📁</span><span>Library</span>
        </div>
        <div class="nav-item" onclick="switchTab('player')">
            <span class="nav-icon">🎧</span><span>Player</span>
        </div>
        <div class="nav-item" onclick="switchTab('notes')">
            <span class="nav-icon">📝</span><span>Notes</span>
        </div>
    </nav>

    <script>
        let db;
        let activeId = null;
        let currentBlobUrl = null;

        // Initialize WaveSurfer
        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#cbd5e1',
            progressColor: '#4f46e5',
            height: 120,
            barWidth: 3,
            barGap: 3,
            normalize: true,
            responsive: true
        });
        const wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());

        // Database
        const req = indexedDB.open("AudioNoteDB_V6", 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore("files", { keyPath: "id", autoIncrement: true });
        req.onsuccess = (e) => { db = e.target.result; loadLibrary(); };

        function switchTab(tabName) {
            document.querySelectorAll('.sidebar, .main-content, .notes-panel').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.querySelectorAll('.nav-item').forEach((el, idx) => {
                const map = {library: 0, player: 1, notes: 2};
                el.classList.toggle('active', idx === map[tabName]);
            });
            // Re-render waveform if switching to player
            if (tabName === 'player' && activeId) {
                setTimeout(() => wavesurfer.zoom(0), 100);
            }
        }

        function loadLibrary() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div');
                    div.className = `file-item ${activeId === cursor.value.id ? 'active' : ''}`;
                    div.innerHTML = `<span>${cursor.value.name}</span> <span onclick="delFile(event, ${cursor.value.id})" style="color:#ef4444; font-weight:bold; padding:5px;">✕</span>`;
                    div.onclick = () => openFile(cursor.value.id);
                    list.appendChild(div);
                    cursor.continue();
                }
            };
        }

        async function openFile(id) {
            activeId = id;
            document.getElementById('loader').style.display = 'flex';
            
            db.transaction("files", "readonly").objectStore("files").get(id).onsuccess = async (e) => {
                const f = e.target.result;
                document.getElementById('file-title').innerText = f.name;
                
                // Switch UI
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                switchTab('player');

                // Cleanup memory
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = URL.createObjectURL(f.data);

                try {
                    await wavesurfer.load(currentBlobUrl);
                    wsRegions.clearRegions();
                    renderNotes(f.notes);
                    f.notes.forEach(n => wsRegions.addRegion({ start: n.time, end: n.time + 0.1, color: 'rgba(79, 70, 229, 0.2)' }));
                } catch (err) {
                    alert("Could not load this file. It might be too large for your phone's memory.");
                } finally {
                    document.getElementById('loader').style.display = 'none';
                    loadLibrary();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loader').style.display = 'flex';
            const tx = db.transaction("files", "readwrite");
            tx.objectStore("files").add({ name: file.name, data: file, notes: [] }).onsuccess = (ev) => {
                loadLibrary();
                openFile(ev.target.result);
            };
        };

        const handleAddNote = () => {
            const input = document.getElementById('note-input');
            const text = input.value.trim();
            if (!text || !activeId) return;
            const time = wavesurfer.getCurrentTime();
            const tx = db.transaction("files", "readwrite");
            const store = tx.objectStore("files");
            store.get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                f.notes.push({ id: Date.now(), time, text });
                store.put(f).onsuccess = () => {
                    input.value = '';
                    renderNotes(f.notes);
                    wsRegions.addRegion({ start: time, end: time + 0.1, color: 'rgba(79, 70, 229, 0.2)' });
                };
            };
        };

        function renderNotes(notes) {
            const container = document.getElementById('notes-display');
            container.innerHTML = '';
            notes.sort((a,b) => b.time - a.time).forEach(n => {
                const d = document.createElement('div');
                d.className = 'note-card';
                d.innerHTML = `
                    <span style="color:#ef4444; position:absolute; top:12px; right:12px; cursor:pointer; font-weight:bold; padding:5px;" onclick="delNote(${n.id})">✕</span>
                    <span class="note-time" onclick="wavesurfer.setTime(${n.time}); switchTab('player');">${new Date(n.time * 1000).toISOString().substr(14, 5)}</span>
                    <div style="margin-top:8px; font-size:14px;">${n.text}</div>`;
                container.appendChild(d);
            });
        }

        window.delNote = (noteId) => {
            const tx = db.transaction("files", "readwrite").objectStore("files");
            tx.get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                f.notes = f.notes.filter(n => n.id !== noteId);
                tx.put(f).onsuccess = () => renderNotes(f.notes);
            };
        };

        window.delFile = (e, id) => {
            e.stopPropagation();
            if(confirm("Delete this project?")) db.transaction("files", "readwrite").objectStore("files").delete(id).onsuccess = () => location.reload();
        };

        function exportNotes() {
            db.transaction("files", "readonly").objectStore("files").get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                const text = f.notes.sort((a,b) => a.time - b.time).map(n => `[${new Date(n.time * 1000).toISOString().substr(14, 5)}] ${n.text}`).join('\n');
                const blob = new Blob([text], { type: 'text/plain' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${f.name}_notes.txt`; a.click();
            };
        }

        document.getElementById('btn-add').onclick = handleAddNote;
        document.getElementById('note-input').onkeydown = (e) => { if(e.key === 'Enter') handleAddNote(); };
        document.getElementById('btn-play').onclick = () => wavesurfer.playPause();
        wavesurfer.on('play', () => document.getElementById('btn-play').innerText = '⏸');
        wavesurfer.on('pause', () => document.getElementById('btn-play').innerText = '▶');
        wavesurfer.on('timeupdate', (t) => {
            const dur = wavesurfer.getDuration() || 0;
            document.getElementById('timer').innerText = `${new Date(t * 1000).toISOString().substr(14, 5)} / ${new Date(dur * 1000).toISOString().substr(14, 5)}`;
        });
    </script>
</body>
</html>
