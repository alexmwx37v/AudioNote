<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AudioNote</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --bg-app: #f1f5f9; --bg-side: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-app: #0f172a; --bg-side: #1e293b; --text-main: #f1f5f9;
                --text-muted: #94a3b8; --border: #334155;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100vw; font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); overflow: hidden; }

        .app-container { display: grid; grid-template-columns: 300px 1fr 340px; height: 100vh; }
        .sidebar, .main-content, .notes-panel { height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }

        .sidebar { background: var(--bg-side); border-right: 1px solid var(--border); padding: 24px; }
        .notes-panel { background: var(--bg-side); border-left: 1px solid var(--border); padding: 24px; }
        .main-content { padding: 40px; align-items: center; }

        /* Mobile Responsive Logic */
        @media (max-width: 900px) {
            .sidebar, .main-content, .notes-panel { 
                position: fixed; inset: 0; bottom: 80px; width: 100vw; 
                background: var(--bg-app); z-index: 1; display: none; padding: 20px;
            }
            .sidebar.active, .main-content.active, .notes-panel.active { display: flex !important; }
            .mobile-nav { display: flex !important; }
            .main-content { padding-top: 30px; }
        }

        /* Large Mobile Nav Bar */
        .mobile-nav { 
            display: none; position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: var(--bg-side); border-top: 1px solid var(--border); 
            justify-content: space-around; align-items: center; z-index: 1000; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; height: 100%; color: var(--text-muted); cursor: pointer;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 26px; margin-bottom: 4px; }
        .nav-label { font-size: 11px; font-weight: 700; }

        /* Buttons & UI */
        .logo { font-weight: 800; font-size: 24px; margin-bottom: 20px; color: var(--text-main); }
        .upload-btn { background: var(--primary); color: white; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; text-align: center; display: block; margin-bottom: 20px; }
        
        .file-list { flex-grow: 1; }
        .file-item { padding: 15px; border-radius: 12px; margin-bottom: 10px; background: var(--bg-side); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .file-item.active { border-color: var(--primary); background: rgba(79, 70, 229, 0.05); color: var(--primary); font-weight: bold; }

        .player-card { width: 100%; max-width: 600px; background: var(--bg-side); padding: 25px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        #waveform { margin: 20px 0; background: rgba(0,0,0,0.02); border-radius: 10px; min-height: 100px; }
        
        .controls { display: flex; align-items: center; gap: 20px; }
        #btn-play { width: 55px; height: 55px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 22px; cursor: pointer; }
        #timer { font-family: monospace; font-weight: bold; opacity: 0.7; }

        .input-group { margin-top: 25px; display: flex; gap: 10px; width: 100%; max-width: 600px; }
        input[type="text"] { flex-grow: 1; padding: 16px; border-radius: 14px; border: 1px solid var(--border); font-size: 16px; background: var(--bg-side); color: var(--text-main); outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 14px; font-weight: 700; }

        .note-card { padding: 16px; border-radius: 14px; background: var(--bg-app); margin-bottom: 12px; border-left: 4px solid var(--primary); position: relative; text-align: left; }
        .note-time { color: var(--primary); font-family: monospace; font-weight: 800; cursor: pointer; margin-bottom: 5px; display: block; }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 2000; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">Processing Audio...</div>

    <div class="app-container">
        <!-- Tab 1: Library -->
        <aside class="sidebar active" id="tab-library">
            <div class="logo">AudioNote</div>
            <label class="upload-btn">
                + Upload Audio
                <input type="file" id="audio-upload" accept="audio/*" style="display: none;">
            </label>
            <div class="file-list" id="file-list"></div>
        </aside>

        <!-- Tab 2: Player -->
        <main class="main-content" id="tab-player">
            <div id="empty-state" style="text-align: center; margin-top: 100px;">
                <div style="font-size: 50px; margin-bottom: 10px;">🎧</div>
                <h2>No Audio Loaded</h2>
                <p style="color: var(--text-muted)">Go to the Library tab to upload a file.</p>
            </div>
            <div id="player-ui" style="display: none; width: 100%;">
                <div class="player-card">
                    <div id="file-title" style="font-weight: 800; margin-bottom: 15px; font-size: 18px;">Filename.mp3</div>
                    <div class="controls">
                        <button id="btn-play">▶</button>
                        <span id="timer">00:00 / 00:00</span>
                    </div>
                    <div id="waveform"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="note-input" placeholder="Type a note...">
                    <button id="btn-add" class="add-btn">Add</button>
                </div>
            </div>
        </main>

        <!-- Tab 3: Notes -->
        <aside class="notes-panel" id="tab-notes">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 style="margin:0">Notes</h3>
                <button onclick="exportNotes()" style="font-size: 12px; background: none; border: 1px solid var(--border); padding: 5px 10px; border-radius: 8px; color: var(--text-muted); font-weight: bold;">Export .TXT</button>
            </div>
            <div id="notes-display"></div>
        </aside>
    </div>

    <!-- Bottom Nav Bar -->
    <nav class="mobile-nav">
        <div class="nav-item active" onclick="switchTab('library')">
            <span class="nav-icon">📁</span>
            <span class="nav-label">Library</span>
        </div>
        <div class="nav-item" onclick="switchTab('player')">
            <span class="nav-icon">🎧</span>
            <span class="nav-label">Player</span>
        </div>
        <div class="nav-item" onclick="switchTab('notes')">
            <span class="nav-icon">📝</span>
            <span class="nav-label">Notes</span>
        </div>
    </nav>

    <script>
        let db;
        let activeId = null;
        let currentUrl = null;

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#cbd5e1',
            progressColor: '#4f46e5',
            height: 100,
            barWidth: 2,
            normalize: true,
            responsive: true
        });

        function switchTab(tabName) {
            document.querySelectorAll('.sidebar, .main-content, .notes-panel').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach((el, idx) => {
                const map = {library: 0, player: 1, notes: 2};
                el.classList.toggle('active', idx === map[tabName]);
            });

            if (tabName === 'player' && activeId) {
                setTimeout(() => wavesurfer.zoom(0), 100);
            }
        }

        const req = indexedDB.open("AudioNote_V8", 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore("files", { keyPath: "id", autoIncrement: true });
        req.onsuccess = (e) => { db = e.target.result; loadLibrary(); };

        function loadLibrary() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div');
                    div.className = `file-item ${activeId === cursor.value.id ? 'active' : ''}`;
                    div.innerHTML = `<span>${cursor.value.name}</span> <span onclick="delFile(event, ${cursor.value.id})" style="color:#ef4444; font-weight: bold; padding: 5px;">✕</span>`;
                    div.onclick = () => openFile(cursor.value.id);
                    list.appendChild(div);
                    cursor.continue();
                }
            };
        }

        async function openFile(id) {
            activeId = id;
            document.getElementById('loader').style.display = 'flex';
            
            db.transaction("files", "readonly").objectStore("files").get(id).onsuccess = async (e) => {
                const f = e.target.result;
                document.getElementById('file-title').innerText = f.name;
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('player-ui').style.display = 'block';
                
                switchTab('player');

                if (currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(f.data);

                try {
                    await wavesurfer.load(currentUrl);
                    renderNotes(f.notes);
                } catch (err) {
                    alert("Error loading audio.");
                } finally {
                    document.getElementById('loader').style.display = 'none';
                    loadLibrary();
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const tx = db.transaction("files", "readwrite");
            tx.objectStore("files").add({ name: file.name, data: file, notes: [] }).onsuccess = (ev) => {
                loadLibrary();
                openFile(ev.target.result);
            };
        };

        function renderNotes(notes) {
            const container = document.getElementById('notes-display');
            container.innerHTML = '';
            notes.sort((a,b) => b.time - a.time).forEach(n => {
                const d = document.createElement('div');
                d.className = 'note-card';
                d.innerHTML = `
                    <span style="color:#ef4444; position:absolute; top:12px; right:12px; cursor:pointer; font-weight:bold;" onclick="delNote(${n.id})">✕</span>
                    <span class="note-time" onclick="wavesurfer.setTime(${n.time}); switchTab('player');">${new Date(n.time * 1000).toISOString().substr(14, 5)}</span>
                    <div style="font-size:14px; line-height:1.4;">${n.text}</div>`;
                container.appendChild(d);
            });
        }

        document.getElementById('btn-add').onclick = () => {
            const input = document.getElementById('note-input');
            const text = input.value.trim();
            if (!text || !activeId) return;
            const time = wavesurfer.getCurrentTime();
            const tx = db.transaction("files", "readwrite");
            const store = tx.objectStore("files");
            store.get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                f.notes.push({ id: Date.now(), time, text });
                store.put(f).onsuccess = () => {
                    input.value = '';
                    renderNotes(f.notes);
                };
            };
        };

        window.delNote = (noteId) => {
            const tx = db.transaction("files", "readwrite").objectStore("files");
            tx.get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                f.notes = f.notes.filter(n => n.id !== noteId);
                tx.put(f).onsuccess = () => renderNotes(f.notes);
            };
        };

        window.delFile = (e, id) => {
            e.stopPropagation();
            if(confirm("Delete project?")) db.transaction("files", "readwrite").objectStore("files").delete(id).onsuccess = () => location.reload();
        };

        function exportNotes() {
            db.transaction("files", "readonly").objectStore("files").get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                const text = f.notes.sort((a,b) => a.time - b.time).map(n => `[${new Date(n.time * 1000).toISOString().substr(14, 5)}] ${n.text}`).join('\n');
                const blob = new Blob([text], { type: 'text/plain' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${f.name}.txt`; a.click();
            };
        }

        document.getElementById('btn-play').onclick = () => wavesurfer.playPause();
        wavesurfer.on('play', () => document.getElementById('btn-play').innerText = '⏸');
        wavesurfer.on('pause', () => document.getElementById('btn-play').innerText = '▶');
        wavesurfer.on('timeupdate', (t) => {
            const dur = wavesurfer.getDuration() || 0;
            document.getElementById('timer').innerText = `${new Date(t * 1000).toISOString().substr(14, 5)} / ${new Date(dur * 1000).toISOString().substr(14, 5)}`;
        });
    </script>
</body>
</html>
