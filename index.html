<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AudioNote</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --bg-app: #f1f5f9; --bg-side: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-app: #0f172a; --bg-side: #1e293b; --text-main: #f1f5f9;
                --text-muted: #94a3b8; --border: #334155;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100vw; font-family: 'Inter', sans-serif; background: var(--bg-app); color: var(--text-main); overflow: hidden; }

        .app-container { display: grid; grid-template-columns: 300px 1fr 340px; height: 100vh; }
        .sidebar, .main-content, .notes-panel { height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }

        .sidebar { background: var(--bg-side); border-right: 1px solid var(--border); padding: 24px; }
        .notes-panel { background: var(--bg-side); border-left: 1px solid var(--border); padding: 24px; }
        .main-content { padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }

        @media (max-width: 900px) {
            .app-container { display: block; }
            .sidebar, .main-content, .notes-panel { position: fixed; inset: 0; bottom: 80px; width: 100vw; background: var(--bg-app); z-index: 1; display: none; padding: 20px; }
            .sidebar.active, .main-content.active, .notes-panel.active { display: flex !important; }
            .mobile-nav { display: flex !important; }
        }

        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--bg-side); border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; height: 100%; color: var(--text-muted); cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        .logo { font-weight: 800; font-size: 24px; margin-bottom: 20px; }
        .upload-btn { background: var(--primary); color: white; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; text-align: center; display: block; margin-bottom: 20px; }
        
        .file-item { padding: 15px; border-radius: 12px; margin-bottom: 10px; background: var(--bg-side); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .file-item:hover { border-color: var(--primary); }
        .file-item.active { border-color: var(--primary); background: rgba(79, 70, 229, 0.1); color: var(--primary); font-weight: bold; }

        .player-card { width: 100%; max-width: 650px; background: var(--bg-side); padding: 25px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        #waveform { margin: 25px 0; background: rgba(0,0,0,0.02); border-radius: 12px; min-height: 100px; position: relative; }
        
        .controls { display: flex; align-items: center; gap: 15px; }
        #btn-play { width: 55px; height: 55px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 22px; cursor: pointer; flex-shrink: 0; }
        #volume-slider { accent-color: var(--primary); width: 100px; cursor: pointer; }

        .input-group { margin-top: 25px; display: flex; gap: 10px; width: 100%; max-width: 650px; }
        input[type="text"] { flex-grow: 1; padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-side); color: var(--text-main); outline: none; font-size: 16px; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 25px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        .note-card { padding: 16px; border-radius: 14px; background: var(--bg-app); margin-bottom: 12px; border-left: 5px solid var(--primary); position: relative; text-align: left; }
        .note-time { font-family: monospace; font-weight: 800; cursor: pointer; margin-bottom: 5px; display: block; font-size: 14px; }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: white; z-index: 2000; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(4px); }
        .wavesurfer-region { width: 3px !important; border-radius: 2px; opacity: 1 !important; z-index: 10; }
    </style>
</head>
<body>

    <div id="loader">Syncing...</div>

    <div class="app-container">
        <aside class="sidebar active" id="tab-library">
            <div class="logo">AudioNote</div>
            <label class="upload-btn">
                + Upload Audio
                <input type="file" id="audio-upload" accept="audio/*" style="display: none;">
            </label>
            <div class="file-list" id="file-list"></div>
        </aside>

        <main class="main-content" id="tab-player">
            <div id="empty-state" style="text-align: center; margin-top: 60px;">
                <div style="font-size: 60px;">🎧</div>
                <h2 style="margin-top: 10px;">No Audio Loaded</h2>
                <p style="color: var(--text-muted)">Select a project or upload a file.</p>
            </div>
            
            <div id="player-ui" style="display: none; width: 100%; flex-direction: column; align-items: center;">
                <div class="player-card">
                    <div id="file-title" style="font-weight: 800; font-size: 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Loading...</div>
                    <div class="controls">
                        <button id="btn-play">▶</button>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span>🔊</span>
                            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                        </div>
                        <span id="timer" style="margin-left: auto; font-family: monospace; font-weight: bold; opacity: 0.7;">00:00 / 00:00</span>
                    </div>
                    <div id="waveform"></div>
                </div>
                <div class="input-group">
                    <input type="text" id="note-input" placeholder="Type a note and press Enter...">
                    <button id="btn-add" class="add-btn">Add</button>
                </div>
            </div>
        </main>

        <aside class="notes-panel" id="tab-notes">
            <h3 style="margin-bottom: 20px;">Notes</h3>
            <div id="notes-display"></div>
        </aside>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item active" onclick="switchTab('library')">📁</div>
        <div class="nav-item" onclick="switchTab('player')">🎧</div>
        <div class="nav-item" onclick="switchTab('notes')">📝</div>
    </nav>

    <script>
        let db;
        let activeId = null;
        let currentUrl = null;
        let isUploading = false; // Prevents duplicate triggers
        const colorPalette = ['#f43f5e', '#f59e0b', '#10b981', '#06b6d4', '#8b5cf6', '#ec4899', '#3b82f6'];

        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#cbd5e1',
            progressColor: '#4f46e5',
            height: 100,
            barWidth: 2,
            normalize: true
        });
        const wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());

        function switchTab(t) {
            document.querySelectorAll('.sidebar, .main-content, .notes-panel').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('tab-' + t);
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-item').forEach((el, idx) => {
                const map = {library: 0, player: 1, notes: 2};
                el.classList.toggle('active', idx === map[t]);
            });
        }

        const req = indexedDB.open("AudioNote_Global_v2", 1);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore("files", { keyPath: "id", autoIncrement: true });
        req.onsuccess = (e) => { db = e.target.result; loadLibrary(); };

        function loadLibrary() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            const tx = db.transaction("files", "readonly").objectStore("files");
            tx.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div');
                    const cid = cursor.value.id;
                    div.className = `file-item ${activeId === cid ? 'active' : ''}`;
                    div.innerHTML = `<span style="pointer-events:none">${cursor.value.name}</span><span onclick="delFile(event, ${cid})" style="color:#ef4444; font-weight:bold; padding:5px">✕</span>`;
                    div.onclick = () => openFile(cid);
                    list.appendChild(div);
                    cursor.continue();
                }
            };
        }

        async function openFile(id) {
            const numericId = Number(id);
            activeId = numericId;
            
            // Sync UI highlighting immediately
            loadLibrary(); 
            
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';

            const tx = db.transaction("files", "readonly");
            tx.objectStore("files").get(numericId).onsuccess = async (ev) => {
                const f = ev.target.result;
                if (!f) { loader.style.display = 'none'; return; }

                document.getElementById('file-title').innerText = f.name;
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('player-ui').style.display = 'flex';
                
                wavesurfer.pause();
                wsRegions.clearRegions();
                if (currentUrl) URL.revokeObjectURL(currentUrl);
                currentUrl = URL.createObjectURL(f.data);

                try {
                    await wavesurfer.load(currentUrl);
                    renderNotes(f.notes);
                    switchTab('player');
                } catch (err) {
                    console.error("Audio Load Error:", err);
                } finally {
                    loader.style.display = 'none';
                }
            };
        }

        document.getElementById('audio-upload').onchange = (e) => {
            if (isUploading) return;
            const file = e.target.files[0];
            if (!file) return;

            isUploading = true;
            const tx = db.transaction("files", "readwrite");
            const store = tx.objectStore("files");
            
            const addReq = store.add({ name: file.name, data: file, notes: [] });
            
            addReq.onsuccess = (ev) => {
                isUploading = false;
                e.target.value = ''; // Reset input
                openFile(ev.target.result); // openFile calls loadLibrary internally
            };
            addReq.onerror = () => { isUploading = false; };
        };

        function renderNotes(notes) {
            const container = document.getElementById('notes-display');
            container.innerHTML = '';
            wsRegions.clearRegions();
            if (!notes) return;

            [...notes].sort((a,b) => a.time - b.time).forEach((n, i) => {
                const color = colorPalette[i % colorPalette.length];
                const d = document.createElement('div');
                d.className = 'note-card';
                d.style.borderLeftColor = color;
                d.innerHTML = `
                    <span class="note-time" style="color:${color}" onclick="wavesurfer.setTime(${n.time}); switchTab('player')">${formatTime(n.time)}</span>
                    <div style="font-size:14px; line-height:1.4; padding-right:20px;">${n.text}</div>
                    <span onclick="delNote(${n.id})" style="position:absolute; top:12px; right:12px; cursor:pointer; font-weight:bold; opacity:0.5;">✕</span>`;
                container.appendChild(d);
                wsRegions.addRegion({ start: n.time, color: color, drag: false, resize: false });
            });
            container.scrollTop = container.scrollHeight;
        }

        function addNote() {
            const input = document.getElementById('note-input');
            const text = input.value.trim();
            if (!text || activeId === null) return;
            
            const time = wavesurfer.getCurrentTime();
            const tx = db.transaction("files", "readwrite");
            const store = tx.objectStore("files");
            
            store.get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                if(!f) return;
                if(!f.notes) f.notes = [];
                f.notes.push({ id: Date.now(), time, text });
                
                const putReq = store.put(f);
                putReq.onsuccess = () => {
                    input.value = '';
                    renderNotes(f.notes);
                };
            };
        }

        document.getElementById('btn-add').onclick = addNote;
        document.getElementById('note-input').onkeydown = (e) => { if (e.key === 'Enter') addNote(); };
        document.getElementById('volume-slider').oninput = (e) => wavesurfer.setVolume(e.target.value);
        document.getElementById('btn-play').onclick = () => wavesurfer.playPause();

        window.delNote = (nid) => {
            if (!activeId) return;
            const tx = db.transaction("files", "readwrite").objectStore("files");
            tx.get(activeId).onsuccess = (e) => {
                const f = e.target.result;
                f.notes = f.notes.filter(n => n.id !== nid);
                tx.put(f).onsuccess = () => renderNotes(f.notes);
            };
        };

        window.delFile = (e, id) => {
            e.stopPropagation();
            if (confirm("Delete this project?")) {
                const numericId = Number(id);
                db.transaction("files", "readwrite").objectStore("files").delete(numericId).onsuccess = () => {
                    if (activeId === numericId) location.reload();
                    else loadLibrary();
                };
            }
        };

        wavesurfer.on('play', () => document.getElementById('btn-play').innerText = '⏸');
        wavesurfer.on('pause', () => document.getElementById('btn-play').innerText = '▶');
        wavesurfer.on('timeupdate', (t) => {
            document.getElementById('timer').innerText = `${formatTime(t)} / ${formatTime(wavesurfer.getDuration())}`;
        });
        wsRegions.on('region-clicked', (r) => {
            wavesurfer.setTime(r.start);
        });
    </script>
</body>
</html>
